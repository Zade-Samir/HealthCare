spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/authDB
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always

server:
  port: 9000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Space added after colon and trailing slash
    register-with-eureka: true # means to register
    fetch-registry: true # means list of other services
  instance:
    prefer-ip-address: true # instread of port, use IP is good in production

app:
  security:
    doctor-code: "DOCTOR_CODE_123"
    admin-code: "SUPER_SECRET_ADMIN_99"
    secret-key: "5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437"