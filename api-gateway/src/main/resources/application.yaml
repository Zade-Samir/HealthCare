server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
              - Path=/auth/**
            # NO FILTER HERE - Login/Register must be public

        - id: doctor-service
          uri: lb://DOCTOR-SERVICE # lb: means use service by using load-balancing it first
          predicates: # means which start with this path should send to this service
            - Path=/doctors/**
          filters:
            - AuthenticationFilter # ACTIVATE SECURITY HERE
            - AddRequestHeader=X-Internal-Secret, HealthProject2026 # Secret Key

        - id: patient-service
          uri: lb://PATIENT-SERVICE
          predicates:
            - Path=/patients/**
          filters:
            - AuthenticationFilter # ACTIVATE SECURITY HERE
            - AddRequestHeader=X-Internal-Secret, HealthProject2026 # Secret Key

        - id: appointment-service
          uri: lb://APPOINTMENT-SERVICE
          predicates:
            - Path=/appointments/**
          filters:
            - AuthenticationFilter # ACTIVATE SECURITY HERE
            - AddRequestHeader=X-Internal-Secret, HealthProject2026 # Secret Key

        - id: medical-record-service
          uri: lb://MEDICAL-RECORD-SERVICE
          predicates:
            - Path=/records/**
          filters:
            - AuthenticationFilter # ACTIVATE SECURITY HERE
            - AddRequestHeader=X-Internal-Secret, HealthProject2026 # Secret Key

        - id: billing-service
          uri: lb://BILLING-SERVICE
          predicates:
            - Path=/billing/**
          filters:
            - AuthenticationFilter # ACTIVATE SECURITY HERE
            - AddRequestHeader=X-Internal-Secret, HealthProject2026 # Secret Key

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


